<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greater/Less Than</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/greater_less.css') }}">
    </head>
<body>

    <div class="card">
        <h2>Greater/Less Than</h2>
    </div>

    <div class="greater-less-row">
        <div class="greater-less-col">
            <label for="greaterDropdown"><strong>Greater Than</strong></label>

            <div id="greaterDropdownWrap">
                <select id="greaterDropdown" name="greater" style="width:100%;padding:0.8em;border-radius:0.5em;">
                    <option value="">Loading 2024 values...</option>
                </select>
            </div>

            <div id="greaterInputWrap" style="display:none;">
                <input id="greaterInput" type="number" step="any" placeholder="Enter minimum value" style="width:100%;padding:0.8em;border-radius:0.5em;border:1px solid #b8c6d1;font-size:1em;box-sizing:border-box;">
            </div>

            <button id="greaterModeBtn" type="button" class="button-card-2" style="width:100%;margin-top:0.7em;">Switch to text box</button>
        </div>

        <div class="greater-less-divider">
            <div style="height:40px;min-width:100px;border-radius:20px;border:none;background:#006c9e;color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 14px;">
                &lt;= X &lt;=
            </div>
        </div>

        <div class="greater-less-col">
            <label for="lessDropdown"><strong>Less Than</strong></label>

            <div id="lessDropdownWrap">
                <select id="lessDropdown" name="less" style="width:100%;padding:0.8em;border-radius:0.5em;">
                    <option value="">Loading 2024 values...</option>
                </select>
            </div>

            <div id="lessInputWrap" style="display:none;">
                <input id="lessInput" type="number" step="any" placeholder="Enter maximum value" style="width:100%;padding:0.8em;border-radius:0.5em;border:1px solid #b8c6d1;font-size:1em;box-sizing:border-box;">
            </div>

            <button id="lessModeBtn" type="button" class="button-card-2" style="width:100%;margin-top:0.7em;">Switch to text box</button>
        </div>
    </div>

    <div style="text-align:center;color:#005b85;font-weight:700;margin-top:0.4em;">
        2024 bus lines and SkyTrain stations
    </div>

    <div id="rangeWarning" style="display:none;text-align:center;color:#c91f1f;font-weight:700;margin-top:0.18em;"></div>
    <div id="rangeSwapWrap" style="display:none;text-align:center;">
        <button id="rangeSwapBtn" type="button" class="button-card-2" style="display:none;width:220px;margin:0.1em auto 0 auto;">Swap left/right values</button>
    </div>

    <div class="filter-section">
        <div class="daily-boardings-selectors filter-buttons" id="entityScopeButtons">
            <button type="button" class="daily-btn" data-scope="bus">Bus only</button>
            <button type="button" class="daily-btn" data-scope="station">Station only</button>
            <button type="button" class="daily-btn daily-btn-active" data-scope="both">Bus and Station</button>
        </div>

        <div class="daily-boardings-selectors filter-buttons" id="comparisonFeatureButtons">
            <button type="button" class="daily-btn daily-btn-active" data-feature="annual_boardings" data-label="Annual boardings">Annual boardings</button>
            <button type="button" class="daily-btn" data-feature="weekday_boardings" data-label="Weekday boardings">Weekday boardings</button>
            <button type="button" class="daily-btn" data-feature="sat_boardings" data-label="Sat boardings">Sat boardings</button>
            <button type="button" class="daily-btn" data-feature="sun_hol_boardings" data-label="Sun/Hol boardings">Sun/Hol boardings</button>

            <button type="button" class="daily-btn" data-feature="revenue_hours" data-bus-only="true" data-label="Revenue hours">Revenue hours</button>
            <button type="button" class="daily-btn" data-feature="boardings_per_revenue_hour" data-bus-only="true" data-label="Boardings/revenue hours">Boardings/revenue hours</button>
            <button type="button" class="daily-btn" data-feature="peak_passenger_load" data-bus-only="true" data-label="Peak passenger load">
                Peak passenger load
                <span class="feature-tooltip" tabindex="0" aria-label="Peak passenger load definition">i
                    <span class="feature-tooltip-text">Average number of passengers on the bus during the busiest part of the route.</span>
                </span>
            </button>
            <button type="button" class="daily-btn" data-feature="peak_load_factor" data-bus-only="true" data-label="Peak load factor">
                Peak load factor
                <span class="feature-tooltip" tabindex="0" aria-label="Peak load factor definition">i
                    <span class="feature-tooltip-text">Average share of bus capacity used during peak conditions.</span>
                </span>
            </button>
            <button type="button" class="daily-btn" data-feature="overcrowded_trips" data-bus-only="true" data-label="% overcrowded trips">% overcrowded trips</button>
            <button type="button" class="daily-btn" data-feature="on_time_performance" data-bus-only="true" data-label="% on time performance">% on time performance</button>
            <button type="button" class="daily-btn" data-feature="bus_bunching" data-bus-only="true" data-label="% bus bunching">% bus bunching</button>
            <button type="button" class="daily-btn" data-feature="avg_speed" data-bus-only="true" data-label="Avg speed">Avg speed</button>
        </div>
    </div>

    <div class="results-controls">
        <button type="button" class="button-card-2" id="searchBtn" style="width:220px;margin:0;">Search</button>
    </div>

    <div class="results-status" id="resultsStatus"></div>

    <div class="results-table-wrap">
        <table class="results-table" id="resultsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>
                        <div class="metric-header-wrap">
                            <span id="metricColumnHeader">Metric</span>
                            <button type="button" id="sortSwapBtn" class="sort-swap-btn" title="Sort: highest to lowest" aria-label="Sort: highest to lowest">↓↑</button>
                        </div>
                    </th>
                </tr>
            </thead>
            <tbody id="resultsTableBody">
                <tr>
                    <td colspan="2">No results yet. Select filters and click Search.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="{{ url_for('static', filename='js/greater_less.js') }}"></script>

    <a href="/" class="button-card back-button">
        &laquo; Back to Home / Upload Page
    </a>

</body>
</html>
